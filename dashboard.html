<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIT Connect Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<div class="dashboard-wrapper role-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zm0 2.26L19.02 9 12 12.74 4.98 9 12 5.26zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/>
        </svg>
      </div>
      <div class="logo-text-wrap">
        <div class="logo-title">MIT Connect</div>
        <div class="logo-sub" id="portalLabel">Role Portal</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="roleNav"></nav>

    <div class="sidebar-footer">
      <a href="login.html">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
        </svg>
        Logout
      </a>
    </div>
  </aside>

  <main class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Toggle menu">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
          </svg>
        </button>
        <div class="topbar-left">
          <h2 id="dashboardTitle">Dashboard</h2>
          <p id="dashboardSubtitle">Role based workspace</p>
        </div>
      </div>
      <div class="topbar-right">
        <span class="badge badge-info" id="roleBadge">Role</span>
      </div>
    </div>

    <div class="profile-header">
      <div class="profile-left">
        <div class="profile-avatar-wrap">
          <div class="avatar-initials" id="avatarInitials">AD</div>
          <span class="avatar-status"></span>
        </div>
        <div class="profile-info">
          <div class="student-name" id="personName">User</div>
          <div class="profile-meta">
            <span class="meta-item" id="personIdMeta"></span>
            <span class="meta-item" id="personTeamMeta"></span>
            <span class="meta-item" id="personFocusMeta"></span>
          </div>
        </div>
      </div>
      <div class="profile-right">
        <button class="btn-primary-sm" id="primaryAction">Create</button>
        <button class="btn-secondary-sm" id="secondaryAction">Manage</button>
      </div>
    </div>

    <div class="section-header">
      <span class="section-title">Quick Overview</span>
    </div>

    <div class="stats-grid" id="roleStats"></div>

    <div class="content-card">
      <div class="section-header" style="margin-bottom:14px;">
        <span class="section-title">Section Access</span>
      </div>
      <div class="role-access-grid" id="sectionAccessGrid"></div>
    </div>

    <div class="bottom-grid">
      <div class="content-card">
        <div class="section-header" style="margin-bottom:14px;">
          <span class="section-title">Today Tasks</span>
        </div>
        <div class="notice-list" id="taskList"></div>
      </div>

      <div class="content-card">
        <div class="section-header" style="margin-bottom:14px;">
          <span class="section-title">Alerts</span>
        </div>
        <div class="notice-list" id="alertList"></div>
      </div>
    </div>
  </main>
</div>

<script>
  const cmsRoles = {
    student: {
      label: 'Student',
      name: 'John Anderson',
      team: 'Computer Science',
      focus: 'Academics',
      primaryAction: 'View Timetable',
      secondaryAction: 'Track Attendance',
      subtitle: 'Track academics, attendance, and upcoming exams.',
      stats: [
        { value: '8.7', label: 'Current GPA', sub: 'Improved this term' },
        { value: '92%', label: 'Attendance', sub: 'Good standing' },
        { value: '4', label: 'Pending Exams', sub: 'This month' },
        { value: '1', label: 'Fee Reminder', sub: 'Due in 10 days' }
      ],
      tasks: [
        { title: 'Complete DBMS assignment', desc: 'Submit before Friday 5:00 PM' },
        { title: 'Download exam hall ticket', desc: 'Available in Academics > Exams' },
        { title: 'Review placement drive list', desc: '3 companies added this week' }
      ],
      alerts: [
        { title: 'Attendance warning in CN', desc: 'Need 75% minimum, current 72%' },
        { title: 'Fee due reminder', desc: 'Semester fee payment closes on 31 March' }
      ]
    },
    admin: {
      label: 'Admin',
      name: 'Nisha Verma',
      team: 'Campus Administration',
      focus: 'Operations',
      primaryAction: 'Approve Admissions',
      secondaryAction: 'Manage Department',
      subtitle: 'Manage students, faculty, admissions, and departments.',
      stats: [
        { value: '1840', label: 'Total Students', sub: 'Across all departments' },
        { value: '128', label: 'Faculty Members', sub: 'Active this semester' },
        { value: '76', label: 'New Admissions', sub: 'Awaiting review' },
        { value: '12', label: 'Dept Requests', sub: 'Need action today' }
      ],
      tasks: [
        { title: 'Approve 24 admission applications', desc: 'Priority: Merit scholarship batch' },
        { title: 'Publish department circular', desc: 'Academic calendar for next term' },
        { title: 'Assign new faculty to sections', desc: '6 classes still unassigned' }
      ],
      alerts: [
        { title: 'Document mismatch found', desc: '8 admission forms require verification' },
        { title: 'Department budget exceeded', desc: 'Civil Engineering crossed monthly cap' }
      ]
    },
    faculty: {
      label: 'Faculty',
      name: 'Dr. Rajesh Iyer',
      team: 'School of Engineering',
      focus: 'Teaching',
      primaryAction: 'Mark Attendance',
      secondaryAction: 'Publish Internal Marks',
      subtitle: 'Handle classes, evaluations, timetables, and student progress.',
      stats: [
        { value: '6', label: 'Classes Today', sub: '2 completed' },
        { value: '312', label: 'Students Mapped', sub: 'Across 4 subjects' },
        { value: '18', label: 'Assessments Pending', sub: 'Need grading' },
        { value: '89%', label: 'Avg Attendance', sub: 'This week' }
      ],
      tasks: [
        { title: 'Upload quiz-2 results', desc: 'CS-303 section B before 4:00 PM' },
        { title: 'Finalize exam paper blueprint', desc: 'Submit to HoD for approval' },
        { title: 'Counsel low attendance students', desc: 'Schedule 6 student meetings' }
      ],
      alerts: [
        { title: 'Timetable updated', desc: 'Friday lecture moved to Lab-4' },
        { title: 'Exam invigilation duty', desc: 'Assigned for 21 March, Morning session' }
      ]
    },
    finance: {
      label: 'Finance',
      name: 'Arun Kumar',
      team: 'Accounts & Billing',
      focus: 'Billing',
      primaryAction: 'Generate Invoices',
      secondaryAction: 'Run Payroll',
      subtitle: 'Monitor fees, payroll, invoices, and financial compliance.',
      stats: [
        { value: 'INR 2.4Cr', label: 'Fees Collected', sub: 'Current quarter' },
        { value: '148', label: 'Unpaid Invoices', sub: 'Requires follow-up' },
        { value: '3', label: 'Payroll Cycles', sub: 'Upcoming this month' },
        { value: '97%', label: 'Collection Rate', sub: 'On target' }
      ],
      tasks: [
        { title: 'Send unpaid fee reminders', desc: 'Batch reminder to 148 accounts' },
        { title: 'Prepare payroll sheet', desc: 'Finalize before 25 March' },
        { title: 'Reconcile invoice register', desc: 'Match 2nd week transactions' }
      ],
      alerts: [
        { title: 'Fee gateway delay', desc: '12 transactions pending confirmation' },
        { title: 'Payroll exception', desc: '2 employee records missing bank details' }
      ]
    }
  };

  const roleMenuGroups = {
    student: [
      {
        title: 'Overview',
        items: ['Dashboard', 'My Courses', 'Department']
      },
      {
        title: 'Academics',
        items: ['Exams', 'Timetable', 'Attendance', 'Placement', 'Facility']
      },
      {
        title: 'Administration',
        items: ['Fees', 'Invoices']
      },
      {
        title: 'Intelligence',
        items: ['Notifications', 'Settings']
      }
    ],
    admin: [
      {
        title: 'Overview',
        items: ['Dashboard', 'Students', 'Faculty', 'Department']
      },
      {
        title: 'Administration',
        items: ['Admission', 'Fees', 'Payroll', 'Invoices']
      },
      {
        title: 'Intelligence',
        items: ['Analytics', 'Notifications', 'Settings']
      },
      {
        title: 'Academics',
        items: ['Exams', 'Timetable', 'Attendance', 'Placement', 'Facility']
      }
    ],
    faculty: [
      {
        title: 'Overview',
        items: ['Dashboard', 'Students', 'Department']
      },
      {
        title: 'Academics',
        items: ['Exams', 'Timetable', 'Attendance', 'Placement']
      },
      {
        title: 'Intelligence',
        items: ['Analytics', 'Notifications', 'Settings']
      }
    ],
    finance: [
      {
        title: 'Overview',
        items: ['Dashboard', 'Department']
      },
      {
        title: 'Administration',
        items: ['Fees', 'Payroll', 'Invoices']
      },
      {
        title: 'Intelligence',
        items: ['Analytics', 'Notifications', 'Settings']
      }
    ]
  };

  function getRole() {
    const params = new URLSearchParams(window.location.search);
    const role = params.get('role') || localStorage.getItem('cmsRole') || 'student';
    if (!cmsRoles[role]) {
      return 'student';
    }
    return role;
  }

  function renderNavigation(role) {
    const nav = document.getElementById('roleNav');
    const menuGroups = roleMenuGroups[role] || roleMenuGroups.student;
    nav.innerHTML = '';

    menuGroups.forEach((group, index) => {
      const groupLabel = document.createElement('div');
      groupLabel.className = 'nav-section-label';
      groupLabel.textContent = group.title;
      nav.appendChild(groupLabel);

      const list = document.createElement('ul');
      group.items.forEach((item, itemIndex) => {
        const li = document.createElement('li');
        const link = document.createElement('a');
        link.href = '#';
        if (index === 0 && itemIndex === 0) {
          link.classList.add('active');
        }
        link.textContent = item;
        li.appendChild(link);
        list.appendChild(li);
      });
      nav.appendChild(list);
    });
  }

  function renderAccessGrid(role) {
    const grid = document.getElementById('sectionAccessGrid');
    const menuGroups = roleMenuGroups[role] || roleMenuGroups.student;
    grid.innerHTML = '';

    menuGroups.forEach((group) => {
      const card = document.createElement('div');
      card.className = 'role-access-card';

      const title = document.createElement('h4');
      title.textContent = group.title;

      const chipWrap = document.createElement('div');
      chipWrap.className = 'role-chip-wrap';

      group.items.forEach((item) => {
        const chip = document.createElement('span');
        chip.className = 'badge badge-gray';
        chip.textContent = item;
        chipWrap.appendChild(chip);
      });

      card.appendChild(title);
      card.appendChild(chipWrap);
      grid.appendChild(card);
    });
  }

  function renderRoleDashboard() {
    const role = getRole();
    const data = cmsRoles[role];
    const userId = localStorage.getItem('cmsUserId') || 'N/A';

    document.title = 'MIT Connect - ' + data.label + ' Dashboard';
    document.getElementById('portalLabel').textContent = 'MIT Connect - ' + data.label + ' Portal';
    document.getElementById('dashboardTitle').textContent = data.label + ' Dashboard';
    document.getElementById('dashboardSubtitle').textContent = data.subtitle;
    document.getElementById('roleBadge').textContent = data.label;
    document.getElementById('personName').textContent = data.name;
    document.getElementById('avatarInitials').textContent = data.label.slice(0, 2).toUpperCase();
    document.getElementById('personIdMeta').textContent = 'ID: ' + userId;
    document.getElementById('personTeamMeta').textContent = 'Team: ' + data.team;
    document.getElementById('personFocusMeta').textContent = 'Focus: ' + data.focus;
    document.getElementById('primaryAction').textContent = data.primaryAction;
    document.getElementById('secondaryAction').textContent = data.secondaryAction;

    const stats = document.getElementById('roleStats');
    stats.innerHTML = '';
    data.stats.forEach((entry, index) => {
      const tone = ['blue', 'green', 'purple', 'orange'][index % 4];
      const card = document.createElement('div');
      card.className = 'stat-card stat-card-' + tone;
      card.innerHTML = [
        '<div class="stat-body">',
        '<div class="stat-value">' + entry.value + '</div>',
        '<div class="stat-label">' + entry.label + '</div>',
        '<div class="stat-sub">' + entry.sub + '</div>',
        '</div>'
      ].join('');
      stats.appendChild(card);
    });

    const taskList = document.getElementById('taskList');
    taskList.innerHTML = '';
    data.tasks.forEach((task) => {
      const item = document.createElement('div');
      item.className = 'notice-item';
      item.innerHTML = '<div class="notice-dot dot-blue"></div><div class="notice-text"><div class="notice-title">' + task.title + '</div><div class="notice-desc">' + task.desc + '</div></div>';
      taskList.appendChild(item);
    });

    const alertList = document.getElementById('alertList');
    alertList.innerHTML = '';
    data.alerts.forEach((alert, index) => {
      const dot = index % 2 === 0 ? 'dot-orange' : 'dot-red';
      const item = document.createElement('div');
      item.className = 'notice-item';
      item.innerHTML = '<div class="notice-dot ' + dot + '"></div><div class="notice-text"><div class="notice-title">' + alert.title + '</div><div class="notice-desc">' + alert.desc + '</div></div>';
      alertList.appendChild(item);
    });

    renderNavigation(role);
    renderAccessGrid(role);
  }

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
  }

  function closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
  }

  renderRoleDashboard();
</script>

</body>
</html>
